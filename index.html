<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>確定申告準備アプリ</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: #f5f7fb;
  margin: 0;
  padding: 20px;
  color: #333;
}

h1 {
  font-size: 22px;
  margin-bottom: 16px;
}

/* カード */
.card {
  background: white;
  padding: 20px;
  border-radius: 16px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.05);
  margin-bottom: 20px;
}

/* タブ */
.tabs {
  display: flex;
  gap: 8px;
  background: #e9eef6;
  padding: 6px;
  border-radius: 12px;
  margin-bottom: 20px;
}

.tabs button {
  flex: 1;
  border: none;
  padding: 12px;
  border-radius: 10px;
  background: transparent;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
}

.tabs button:hover {
  background: white;
}

.tabs button.active {
  background: #2f6bff;
  color: white;
}

/* グリッド（横並び） */
.grid {
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 20px;
}

.grid-2 {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

/* サマリーカード */
.summary-box {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.summary-item {
  background: #f8faff;
  padding: 16px;
  border-radius: 12px;
}

.summary-item h3 {
  margin: 0;
  font-size: 14px;
  color: #666;
}

.summary-item p {
  margin: 4px 0 0;
  font-size: 20px;
  font-weight: bold;
}

/* フォーム */
.form-row {
  display: flex;
  gap: 10px;
  margin-bottom: 10px;
}

.form-row > * {
  flex: 1;
}

input, select, textarea {
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #ddd;
  font-size: 14px;
}

input:focus, select:focus, textarea:focus {
  outline: none;
  border-color: #2f6bff;
  box-shadow: 0 0 0 2px rgba(47,107,255,0.2);
}

/* ボタン */
button {
  padding: 14px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(90deg, #2f6bff, #00c6ff);
  color: white;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  opacity: 0.9;
}

/* データ一覧 */
details {
  margin-top: 20px;
}

summary {
  cursor: pointer;
  font-weight: bold;
}

/* スマホ対応 */
@media (max-width: 768px) {
  .grid, .grid-2 {
    grid-template-columns: 1fr;
  }
}
.tabs button.active {
  background: linear-gradient(135deg, #4facfe, #00c6ff);
  color: white;
  box-shadow: 0 4px 12px rgba(0, 198, 255, 0.25);
}
</style>
</head>

<body>

<h1>確定申告準備アプリ</h1>
<div class="tabs">
  <button onclick="showTab('dashboard')">グラフ</button>
  <button onclick="showTab('input')">入力</button>
  <button onclick="showTab('data')">データ</button>
</div>
<div class="grid">

  <div class="card">
    <h2>月別利益グラフ</h2>
    <canvas id="profitChart"></canvas>
  </div>

  <div class="card">
    <h2>年間サマリー</h2>
    <div id="yearSummary"></div>
  </div>

</div>
<div id="input" class="card">
<h2>入力</h2>

<div class="form-row">
  <input type="date" id="date">
  <select id="account">
    <option value="business">事業</option>
    <option value="investment">FX・株</option>
  </select>
</div>

<div class="form-row">
  <select id="type">
    <option value="income">収入</option>
    <option value="expense">経費</option>
  </select>
  <input type="text" id="category" placeholder="カテゴリ">
</div>

<div class="form-row">
  <input type="number" id="amount" placeholder="金額">
  <input type="text" id="memo" placeholder="メモ">
</div>

<input type="file" id="image" accept="image/*">
<button onclick="readReceipt()">レシート読み取り</button>

<div id="ocrResult"></div>

<button onclick="addData()">追加</button>
</div>

<details id="data" class="card" open>
  <summary><strong>データ一覧</strong></summary>
  <div id="list"></div>
</details>
<script>

let data = JSON.parse(localStorage.getItem("taxData")) || [];
let profitChart = null;

function saveData() {
  localStorage.setItem("taxData", JSON.stringify(data));
}

function addData() {
  const item = {
    id: Date.now(),
    date: document.getElementById("date").value,
    account: document.getElementById("account").value,
    type: document.getElementById("type").value,
    category: document.getElementById("category").value,
    amount: Number(document.getElementById("amount").value),
    memo: document.getElementById("memo").value
  };

  if (!item.date || !item.amount) return alert("入力してください");

  data.push(item);
  saveData();
  updateUI();
}
function showTab(tabName) {
  document.getElementById("dashboard").style.display = "none";
  document.getElementById("input").style.display = "none";
  document.getElementById("data").style.display = "none";

  document.getElementById(tabName).style.display = "block";
}

// 最初はグラフ表示
showTab("dashboard");
function updateUI() {
  updateList();
  updateChart();
  updateYearSummary();
}
function updateYearSummary() {
  const box = document.getElementById("yearSummary");
  box.innerHTML = "";

  const summary = {};

  data.forEach(item => {
    if (!item.date) return;

    const year = item.date.slice(0, 4);

    if (!summary[year]) {
      summary[year] = { income: 0, expense: 0 };
    }

    if (item.type === "income") {
      summary[year].income += Number(item.amount || 0);
    } else {
      summary[year].expense += Number(item.amount || 0);
    }
  });

  const years = Object.keys(summary).sort().reverse();

  if (years.length === 0) {
    box.innerHTML = "<p>まだデータがありません。</p>";
    return;
  }

  years.forEach(year => {
    const income = summary[year].income;
    const expense = summary[year].expense;
    const profit = income - expense;

    box.innerHTML += `
      <div class="summary-item">
        <h3>${year}年</h3>
        <p>収入：¥${income.toLocaleString()}</p>
        <p>経費：¥${expense.toLocaleString()}</p>
        <p><strong>利益：¥${profit.toLocaleString()}</strong></p>
      </div>
    `;
  });
}
function updateList() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  const grouped = {};

  data.forEach(d => {
    const month = d.date.slice(0,7);
    if (!grouped[month]) grouped[month] = [];
    grouped[month].push(d);
  });

  Object.keys(grouped).sort().reverse().forEach(month => {
    const details = document.createElement("details");

    const items = grouped[month];

    const total = items.reduce((sum,d)=> sum + (d.type==="income"?d.amount:-d.amount),0);

    details.innerHTML = `
      <summary>${month} 利益：¥${total.toLocaleString()}</summary>
    `;

    items.forEach(d => {
      const div = document.createElement("div");
      div.className = "row";

      div.innerHTML = `
        ${d.date} ${d.category} ¥${d.amount}
        <button onclick="deleteItem(${d.id})">削除</button>
      `;

      details.appendChild(div);
    });

    list.appendChild(details);
  });
}

function deleteItem(id){
  data = data.filter(d=>d.id!==id);
  saveData();
  updateUI();
}

function updateChart(){
  const summary = {};

  data.forEach(d=>{
    const m = d.date.slice(0,7);
    if(!summary[m]) summary[m]=0;
    summary[m]+= d.type==="income"?d.amount:-d.amount;
  });

  const labels = Object.keys(summary).sort();
  const values = labels.map(l=>summary[l]);

  if(profitChart) profitChart.destroy();

  const ctx = document.getElementById("profitChart").getContext("2d");

  profitChart = new Chart(ctx,{
    type:"line",
    data:{
      labels:labels,
      datasets:[{
        label:"利益",
        data:values,
        borderWidth:2,
        tension:0.3
      }]
    }
  });
}

async function readReceipt(){
  alert("OCR機能は簡易版です");
}

updateUI();

</script>

</body>
</html>
