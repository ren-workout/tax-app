<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>確定申告準備アプリ</title>

<style>
body { font-family: sans-serif; padding: 16px; background: #f5f5f5; }
.card { background: white; padding: 16px; margin-bottom: 16px; border-radius: 12px; }
input, select, textarea, button {
  width: 100%; padding: 12px; margin-top: 8px;
}
button { background: #222; color: white; border: none; border-radius: 8px; }
.delete { background: #c0392b; }
img { width: 80px; margin-top: 5px; border-radius: 6px; }
.modal {
  display:none; position:fixed; top:0; left:0;
  width:100%; height:100%; background:rgba(0,0,0,0.8);
  justify-content:center; align-items:center;
}
.modal img { width:90%; }
</style>
</head>

<body>

<h1>確定申告準備アプリ</h1>

<div class="card">
  <h2>入力</h2>

  <input type="date" id="date">

  <select id="account">
    <option value="business">事業</option>
    <option value="investment">FX・株</option>
  </select>

  <select id="type">
    <option value="income">収入</option>
    <option value="expense">経費</option>
  </select>

  <input type="number" id="amount" placeholder="金額">

  <textarea id="memo" placeholder="メモ"></textarea>

  <label>レシート画像</label>
  <input type="file" id="image" accept="image/*">

  <button onclick="addData()">追加</button>
</div>

<div class="card">
  <h2>一覧</h2>
  <div id="list"></div>
</div>

<div class="modal" id="modal" onclick="closeModal()">
  <img id="modalImg">
</div>

<script>
let data = JSON.parse(localStorage.getItem("taxData")) || [];

function resizeImage(file) {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement("canvas");
        const ctx = canvas.getContext("2d");

        const maxWidth = 600;
        const scale = maxWidth / img.width;

        canvas.width = maxWidth;
        canvas.height = img.height * scale;

        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL("image/jpeg", 0.7));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

async function addData() {
  const file = document.getElementById("image").files[0];
  let imgData = null;

  if (file) {
    imgData = await resizeImage(file);
  }

  data.push({
    id: Date.now(),
    date: document.getElementById("date").value,
    account: document.getElementById("account").value,
    type: document.getElementById("type").value,
    amount: Number(document.getElementById("amount").value),
    memo: document.getElementById("memo").value,
    image: imgData
  });

  localStorage.setItem("taxData", JSON.stringify(data));
  updateUI();
}

function updateUI() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  data.slice().reverse().forEach(d => {
    const div = document.createElement("div");

    div.innerHTML = `
      <p>${d.date} / ¥${d.amount}</p>
      <p>${d.memo || ""}</p>
      ${d.image ? `<img src="${d.image}" onclick="openModal('${d.image}')">` : ""}
      <button class="delete" onclick="deleteItem(${d.id})">削除</button>
      <hr>
    `;

    list.appendChild(div);
  });
}

function deleteItem(id) {
  data = data.filter(d => d.id !== id);
  localStorage.setItem("taxData", JSON.stringify(data));
  updateUI();
}

function openModal(src) {
  document.getElementById("modal").style.display = "flex";
  document.getElementById("modalImg").src = src;
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}

updateUI();
</script>

</body>
</html>
